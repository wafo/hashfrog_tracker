name: CI

on:
  pull_request:
  push:
    branches:
      - 'master'

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout commit
        uses: actions/checkout@v4

      - name: Install Node
        uses: actions/setup-node@v4.0.3
        with:
          node-version: '20.x'

      - name: Install npm packages
        run: npm ci

      - name: Build UI
        run: npm run build

      - name: Run tests
        run: npm test

      - name: Run eslint
        run: npm run lint
